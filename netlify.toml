[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "http://3847sst.kuftyrev.cloud/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "http://3847sst.kuftyrev.cloud/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/socket.io/*"
  to = "http://3847sst.kuftyrev.cloud/socket.io/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
